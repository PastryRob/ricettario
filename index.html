<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricettario — Roberto Zampetti</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F5F0;
  --surface: #FFFFFF;
  --accent: #1A1A1A;
  --green: #2D5A3D;
  --green-light: #EBF2EE;
  --amber: #8B5E3C;
  --amber-light: #F5EDE4;
  --blue: #2C4A6E;
  --blue-light: #E8EDF5;
  --red-light: #FCEFEF;
  --red: #8B2E2E;
  --border: rgba(0,0,0,0.08);
  --text: #1A1A1A;
  --text-muted: #6B6B6B;
  --text-faint: #A0A0A0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); font-size: 14px; }

/* LAYOUT */
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--accent);
  display: flex; flex-direction: column;
  transition: transform 0.3s ease;
  z-index: 100;
}
.sidebar-brand {
  padding: 2rem 1.5rem 1.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-brand .chef { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: #fff; letter-spacing: 0.02em; }
.sidebar-brand .subtitle { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }
.sidebar-search {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-search input {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; padding: 8px 12px; color: #fff; font-family: 'DM Mono', monospace;
  font-size: 12px; outline: none;
}
.sidebar-search input::placeholder { color: rgba(255,255,255,0.3); }
.sidebar-search input:focus { border-color: rgba(255,255,255,0.25); }
.cat-filter {
  padding: 0.75rem 1.5rem;
  display: flex; gap: 6px; flex-wrap: wrap;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.cat-pill {
  font-size: 10px; padding: 3px 10px; border-radius: 20px; cursor: pointer;
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.1); letter-spacing: 0.05em;
  transition: all 0.15s;
}
.cat-pill.active, .cat-pill:hover { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.25); }
.recipe-list { flex: 1; overflow-y: auto; }
.recipe-list::-webkit-scrollbar { width: 3px; }
.recipe-list::-webkit-scrollbar-track { background: transparent; }
.recipe-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
.recipe-item {
  padding: 1rem 1.5rem; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.recipe-item:hover { background: rgba(255,255,255,0.04); }
.recipe-item.active { background: rgba(255,255,255,0.07); border-left-color: rgba(255,255,255,0.5); }
.recipe-item .r-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 400; color: rgba(255,255,255,0.9); line-height: 1.3; }
.recipe-item .r-cat { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 3px; letter-spacing: 0.08em; text-transform: uppercase; }
.add-recipe-btn {
  margin: 1rem 1.5rem; padding: 10px;
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5); font-family: 'DM Mono', monospace;
  font-size: 11px; cursor: pointer; border-radius: 4px;
  letter-spacing: 0.05em; transition: all 0.15s;
}
.add-recipe-btn:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.8); }

/* MAIN */
.main { flex: 1; overflow-y: auto; background: var(--bg); }
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

.recipe-hero {
  background: var(--surface);
  padding: 2.5rem 3rem 2rem;
  border-bottom: 1px solid var(--border);
}
.recipe-hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
.recipe-name { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; line-height: 1.15; color: var(--text); }
.recipe-name em { font-style: italic; }
.badges { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
.badge { font-size: 10px; padding: 3px 10px; border-radius: 2px; letter-spacing: 0.08em; font-weight: 400; }
.badge-cat { background: var(--accent); color: #fff; }
.badge-diff { background: var(--amber-light); color: var(--amber); }
.badge-time { background: var(--blue-light); color: var(--blue); }

.portion-ctrl {
  display: flex; align-items: center; gap: 0;
  border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  flex-shrink: 0;
}
.portion-ctrl button {
  width: 34px; height: 34px; background: var(--bg); border: none; cursor: pointer;
  font-size: 16px; color: var(--text-muted); transition: background 0.1s;
}
.portion-ctrl button:hover { background: #ece9e3; }
.portion-ctrl .p-count {
  min-width: 50px; text-align: center; font-size: 13px;
  color: var(--text); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  padding: 0 8px; line-height: 34px;
}
.portion-ctrl .p-label { font-size: 10px; color: var(--text-faint); display: block; }

/* CONTENT */
.recipe-content { padding: 2rem 3rem 3rem; }
.section-title {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 1rem; margin-top: 2rem;
  padding-top: 1.5rem; border-top: 1px solid var(--border);
}
.section-title:first-child { margin-top: 0; padding-top: 0; border-top: none; }

.component-block { margin-bottom: 1.25rem; }
.component-name {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 0.5rem; padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.ing-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
.ing-row:last-child { border-bottom: none; }
.ing-name { color: var(--text); }
.ing-amount { color: var(--text-muted); font-variant-numeric: tabular-nums; }

.steps-list { display: flex; flex-direction: column; gap: 1rem; }
.step-row { display: flex; gap: 1rem; }
.step-n {
  width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text-muted); flex-shrink: 0; margin-top: 1px;
}
.step-text { color: var(--text); line-height: 1.75; font-size: 13px; }

.note-box {
  background: var(--amber-light); border-left: 3px solid var(--amber);
  padding: 1rem 1.25rem; font-size: 13px; color: var(--amber);
  line-height: 1.75; border-radius: 0 4px 4px 0;
}

.allg-list { display: flex; gap: 6px; flex-wrap: wrap; }
.allg-tag { font-size: 11px; padding: 3px 10px; background: var(--red-light); color: var(--red); border-radius: 2px; }

/* MOBILE MENU */
.menu-toggle {
  display: none; position: fixed; top: 1rem; left: 1rem; z-index: 200;
  width: 40px; height: 40px; background: var(--accent); border: none;
  border-radius: 4px; cursor: pointer; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
}
.menu-toggle span { width: 18px; height: 1.5px; background: #fff; display: block; transition: all 0.2s; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; }

/* EMPTY STATE */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text-faint); gap: 0.5rem; }
.empty p { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; }
.empty small { font-size: 11px; }

@media (max-width: 768px) {
  .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .overlay.open { display: block; }
  .menu-toggle { display: flex; }
  .recipe-hero { padding: 4rem 1.25rem 1.5rem; }
  .recipe-name { font-size: 28px; }
  .recipe-hero-top { flex-direction: column; }
  .recipe-content { padding: 1.5rem 1.25rem 3rem; }
}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle" onclick="toggleMenu()">
  <span></span><span></span><span></span>
</button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="chef">Roberto Zampetti</div>
      <div class="subtitle">Dessert al piatto</div>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Cerca ricetta…" id="searchInput" oninput="filterRecipes()">
    </div>
    <div class="cat-filter" id="catFilter"></div>
    <div class="recipe-list" id="recipeList"></div>
    <button class="add-recipe-btn" onclick="showAddModal()">+ aggiungi ricetta</button>
  </div>

  <div class="main" id="mainContent"></div>
</div>

<!-- ADD MODAL -->
<div id="addModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:8px;padding:2rem;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;">
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:1.5rem;">Nuova ricetta</h2>
    <div style="display:flex;flex-direction:column;gap:0.75rem;">
      <input id="f-name" placeholder="Nome ricetta" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:13px;">
      <input id="f-cat" placeholder="Categoria (es. Cioccolato, Agrumi…)" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:13px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <input id="f-diff" placeholder="Difficoltà" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;">
        <input id="f-time" placeholder="Tempo" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;">
        <input id="f-port" placeholder="Porzioni" type="number" min="1" value="4" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;">
      </div>
      <textarea id="f-ing" placeholder="Ingredienti (una riga per ingrediente, es: Cioccolato fondente 70% | 120 | g)" rows="6" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;resize:vertical;line-height:1.6;"></textarea>
      <textarea id="f-steps" placeholder="Procedimento (una riga per passo)" rows="5" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;resize:vertical;line-height:1.6;"></textarea>
      <input id="f-allg" placeholder="Allergeni separati da virgola" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:13px;">
      <textarea id="f-note" placeholder="Note tecniche" rows="3" style="padding:10px;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;resize:vertical;"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:1.25rem;">
      <button onclick="saveRecipe()" style="flex:1;padding:10px;background:#1A1A1A;color:#fff;border:none;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;">Salva ricetta</button>
      <button onclick="closeModal()" style="padding:10px 16px;background:transparent;border:1px solid #ddd;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;">Annulla</button>
    </div>
  </div>
</div>

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    recipes = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultRecipes));
  } catch(e) { recipes = JSON.parse(JSON.stringify(defaultRecipes)); }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes)); } catch(e) {}
}

function getCategories() {
  const cats = [...new Set(recipes.map(r => r.category))];
  return ['Tutti', ...cats];
}

  let list = recipes;
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (q) list = list.filter(r => r.name.toLowerCase().includes(q) || r.category.toLowerCase().includes(q));
  if (activeCategory !== 'Tutti') list = list.filter(r => r.category === activeCategory);
  return list;
}

function renderSidebar() {
  const cats = getCategories();
  document.getElementById('catFilter').innerHTML = cats.map(c =>
    `<span class="cat-pill ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</span>`
  ).join('');
  const filtered = getFiltered();
  document.getElementById('recipeList').innerHTML = filtered.length === 0
    ? '<div style="padding:1rem 1.5rem;font-size:11px;color:rgba(255,255,255,0.3);">Nessuna ricetta trovata</div>'
    : filtered.map(r => `
      <div class="recipe-item ${r.id === currentId ? 'active' : ''}" onclick="selectRecipe(${r.id})">
        <div class="r-name">${r.name}</div>
        <div class="r-cat">${r.category}</div>
      </div>`).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderSidebar();
}

function filterRecipes() { renderSidebar(); }

function selectRecipe(id) {
  currentId = id;
  const r = recipes.find(x => x.id === id);
  currentPortions = r.porzioni;
  renderSidebar();
  renderMain();
  if (window.innerWidth <= 768) toggleMenu();
}

function fmt(amount, base) {
  const v = amount * currentPortions / base;
  return Number.isInteger(v) ? v : parseFloat(v.toFixed(1));
}

function renderMain() {
  const r = recipes.find(x => x.id === currentId);
  if (!r) {
    document.getElementById('mainContent').innerHTML = `<div class="empty"><p>Seleziona una ricetta</p><small>oppure aggiungine una nuova</small></div>`;
    return;
  }
  document.getElementById('mainContent').innerHTML = `
    <div class="recipe-hero">
      <div class="recipe-hero-top">
        <div>
          <div class="recipe-name">${r.name}</div>
          <div class="badges">
            <span class="badge badge-cat">${r.category}</span>
            <span class="badge badge-diff">${r.difficolta}</span>
            <span class="badge badge-time">${r.tempo}</span>
          </div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text-faint);letter-spacing:0.1em;text-align:center;margin-bottom:6px;">PORZIONI</div>
          <div class="portion-ctrl">
            <button onclick="changePortions(-1)">−</button>
            <div class="p-count">${currentPortions}</div>
            <button onclick="changePortions(1)">+</button>
          </div>
        </div>
      </div>
    </div>
    <div class="recipe-content">
      <div class="section-title">Ingredienti</div>
      ${r.components.map(comp => `
        <div class="component-block">
          <div class="component-name">${comp.name}</div>
          ${comp.ingredients.map(ing => `
            <div class="ing-row">
              <span class="ing-name">${ing.name}</span>
              <span class="ing-amount">${fmt(ing.amount, r.porzioni)} ${ing.unit}</span>
            </div>`).join('')}
        </div>`).join('')}
      <div class="section-title">Procedimento</div>
      <div class="steps-list">
        ${r.steps.map((s,i) => `
          <div class="step-row">
            <div class="step-n">${i+1}</div>
            <div class="step-text">${s}</div>
          </div>`).join('')}
      </div>
      ${r.note ? `<div class="section-title">Note tecniche</div><div class="note-box">${r.note}</div>` : ''}
      ${r.allergeni && r.allergeni.length ? `
        <div class="section-title">Allergeni</div>
        <div class="allg-list">${r.allergeni.map(a => `<span class="allg-tag">${a}</span>`).join('')}</div>` : ''}
      <div style="margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border);">
        <button onclick="deleteRecipe(${r.id})" style="font-size:11px;color:var(--red);background:transparent;border:1px solid #f5c5c5;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:0.05em;">Elimina ricetta</button>
      </div>
    </div>`;
}

function changePortions(d) {
  currentPortions = Math.max(1, currentPortions + d);
  renderMain();
}

function deleteRecipe(id) {
  if (!confirm('Eliminare questa ricetta?')) return;
  recipes = recipes.filter(r => r.id !== id);
  save();
  currentId = recipes.length ? recipes[0].id : null;
  if (currentId) currentPortions = recipes[0].porzioni;
  renderSidebar();
  renderMain();
}

function showAddModal() {
  document.getElementById('addModal').style.display = 'flex';
  ['f-name','f-cat','f-diff','f-time','f-ing','f-steps','f-allg','f-note'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-port').value = 4;
}

function closeModal() {
  document.getElementById('addModal').style.display = 'none';
}

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Inserisci il nome della ricetta'); return; }
  const rawIngs = document.getElementById('f-ing').value.trim();
  const ingredients = rawIngs ? rawIngs.split('\n').filter(l => l.trim()).map(l => {
    const parts = l.split('|').map(p => p.trim());
    return { name: parts[0] || l, amount: parseFloat(parts[1]) || 0, unit: parts[2] || '' };
  }) : [];
  const steps = document.getElementById('f-steps').value.trim().split('\n').filter(l => l.trim());
  const allgRaw = document.getElementById('f-allg').value.trim();
  const newRecipe = {
    id: Date.now(),
    name,
    category: document.getElementById('f-cat').value.trim() || 'Altro',
    difficolta: document.getElementById('f-diff').value.trim() || '—',
    tempo: document.getElementById('f-time').value.trim() || '—',
    porzioni: parseInt(document.getElementById('f-port').value) || 4,
    allergeni: allgRaw ? allgRaw.split(',').map(a => a.trim()).filter(Boolean) : [],
    components: [{ name: 'Ingredienti', ingredients }],
    steps,
    note: document.getElementById('f-note').value.trim()
  };
  recipes.push(newRecipe);
  save();
  currentId = newRecipe.id;
  currentPortions = newRecipe.porzioni;
  closeModal();
  renderSidebar();
  renderMain();
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

load();
if (recipes.length) { currentId = recipes[0].id; currentPortions = recipes[0].porzioni; }
renderSidebar();
renderMain();
</script>
</body>
</html>
